name: Inject Secrets

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Create config with secrets
        run: |
          cat > config.js << 'EOF'
          const WEBHOOKS = {
              "announcements": "${{ secrets.ANNOUNCEMENTS_WEBHOOK }}",
              "mod-announcements": "${{ secrets.MODANNOUNCEMENTS_WEBHOOK }}",
              "info": "${{ secrets.INFO_WEBHOOK }}",
              "paid-roles": "${{ secrets.PAIDROLES_WEBHOOK }}",
              "rules": "${{ secrets.RULES_WEBHOOK }}",
              "request-middleman": "${{ secrets.REQUESTMIDDLEMAN_WEBHOOK }}"
          };
          EOF
      
      - name: Deploy
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add config.js
          git commit -m "Auto-inject secrets"
          git push
